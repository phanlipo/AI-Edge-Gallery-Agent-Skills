<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sport Scoreboard</title>
  </head>
  <body>
    <script>
      const SUPPORTED_SPORTS = new Set(["football", "basketball", "tennis", "table-tennis"]);

      function safeText(value, fallback) {
        const text = String(value ?? "").trim();
        return text || fallback;
      }

      function num(value, field) {
        const n = Number(value);
        if (!Number.isFinite(n)) {
          throw new Error(`Invalid number for '${field}'`);
        }
        return n;
      }

      function normalizeScore(sport, scores) {
        const input = scores && typeof scores === "object" ? scores : {};

        if (sport === "football") {
          return {
            scoreline: `${num(input.home, "scores.home")} - ${num(input.away, "scores.away")}`,
            details: ["Goals"],
          };
        }

        if (sport === "basketball") {
          const details = [];
          const period = safeText(input.period, "-");
          details.push(`Period: ${period}`);

          if (Array.isArray(input.by_period) && input.by_period.length > 0) {
            const line = input.by_period
              .map((row, i) => {
                const label = safeText(row?.label, `P${i + 1}`);
                return `${label} ${num(row?.home, `scores.by_period[${i}].home`)}-${num(row?.away, `scores.by_period[${i}].away`)}`;
              })
              .join(" | ");
            details.push(`By period: ${line}`);
          }

          return {
            scoreline: `${num(input.home, "scores.home")} - ${num(input.away, "scores.away")}`,
            details,
          };
        }

        if (sport === "tennis") {
          if (!Array.isArray(input.sets) || input.sets.length === 0) {
            throw new Error("Tennis requires scores.sets");
          }

          const setsLine = input.sets
            .map((setScore, i) => `S${i + 1} ${num(setScore?.home, `scores.sets[${i}].home`)}-${num(setScore?.away, `scores.sets[${i}].away`)}`)
            .join(" | ");

          return {
            scoreline: `${num(input.games?.home, "scores.games.home")} - ${num(input.games?.away, "scores.games.away")}`,
            details: [
              `Sets: ${setsLine}`,
              `Points: ${safeText(input.points?.home, "0")}-${safeText(input.points?.away, "0")}`,
            ],
          };
        }

        if (!Array.isArray(input.sets) || input.sets.length === 0) {
          throw new Error("Table tennis requires scores.sets");
        }

        const setHistory = input.sets
          .map((setScore, i) => `Set ${i + 1} ${num(setScore?.home, `scores.sets[${i}].home`)}-${num(setScore?.away, `scores.sets[${i}].away`)}`)
          .join(" | ");

        return {
          scoreline: `${num(input.points?.home, "scores.points.home")} - ${num(input.points?.away, "scores.points.away")}`,
          details: [`Current set: ${safeText(input.current_set, String(input.sets.length))}`, `History: ${setHistory}`],
        };
      }

      function buildMarkdown(result) {
        const lines = [
          `## ${result.headline}`,
          `**Score:** ${result.scoreline}`,
          `**Status:** ${result.status}`,
        ];

        if (result.clock !== "-") {
          lines.push(`**Clock:** ${result.clock}`);
        }

        if (result.details.length > 0) {
          lines.push("", "**Details**");
          result.details.forEach((line) => lines.push(`- ${line}`));
        }

        return lines.join("\n");
      }

      function buildResult(payload) {
        const sport = safeText(payload?.sport, "").toLowerCase();
        if (!sport) {
          throw new Error("Missing required field: sport");
        }
        if (!SUPPORTED_SPORTS.has(sport)) {
          throw new Error("Unsupported sport. Use football, basketball, tennis, or table-tennis");
        }

        const home = safeText(payload?.home, "Home");
        const away = safeText(payload?.away, "Away");
        const status = safeText(payload?.status, "Scheduled");
        const clock = safeText(payload?.clock, "-");

        const normalized = normalizeScore(sport, payload?.scores);
        const result = {
          sport,
          home,
          away,
          status,
          clock,
          headline: `${home} vs ${away}`,
          scoreline: normalized.scoreline,
          details: normalized.details,
        };

        return {
          ...result,
          markdown: buildMarkdown(result),
        };
      }

      function toWebviewUrl(result) {
        const payload = encodeURIComponent(JSON.stringify(result));
        return `assets/webview.html?payload=${payload}`;
      }

      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          const payload = JSON.parse(data || "{}");
          const result = buildResult(payload);

          return JSON.stringify({
            ...result,
            result: `Scoreboard ready for ${result.headline}`,
            webview: {
              url: toWebviewUrl(result),
              aspectRatio: 1.6,
            },
          });
        } catch (error) {
          console.error(error);
          return JSON.stringify({
            error: `Failed to build scoreboard: ${error.message}`,
          });
        }
      };
    </script>
  </body>
</html>
