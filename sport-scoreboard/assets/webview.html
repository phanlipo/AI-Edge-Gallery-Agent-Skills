<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sport Scoreboard</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #1f2937, #0b1220 70%);
        color: #e5e7eb;
      }

      .frame {
        margin: 10px;
        border-radius: 16px;
        border: 1px solid #2a3649;
        background: #0f172a;
        padding: 14px;
      }

      .sport {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #93c5fd;
        margin-bottom: 8px;
      }

      h2 {
        margin: 0;
        font-size: 20px;
      }

      .score {
        margin: 8px 0;
        font-size: 36px;
        font-weight: 800;
        color: #f8fafc;
      }

      .meta {
        font-size: 12px;
        color: #a5b4fc;
      }

      ul {
        margin: 10px 0 0;
        padding-left: 18px;
      }

      li {
        margin-bottom: 4px;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div id="sport" class="sport">SPORT</div>
      <h2 id="headline">Home vs Away</h2>
      <div id="scoreline" class="score">0 - 0</div>
      <div id="meta" class="meta">Status: Scheduled</div>
      <ul id="details"></ul>
    </div>

    <script>
      function safeText(value, fallback) {
        const text = String(value ?? "").trim();
        return text || fallback;
      }

      function parsePayload() {
        const params = new URLSearchParams(window.location.search);
        const raw = params.get("payload");
        if (!raw) return null;

        try {
          return JSON.parse(raw);
        } catch (error) {
          console.error(error);
          return null;
        }
      }

      function render(payload) {
        const data = payload || {};
        document.getElementById("sport").textContent = safeText(data.sport, "SPORT").toUpperCase();
        document.getElementById("headline").textContent = safeText(data.headline, "Home vs Away");
        document.getElementById("scoreline").textContent = safeText(data.scoreline, "0 - 0");

        const status = safeText(data.status, "Scheduled");
        const clock = safeText(data.clock, "-");
        document.getElementById("meta").textContent = clock === "-" ? `Status: ${status}` : `Status: ${status} • Clock: ${clock}`;

        const list = document.getElementById("details");
        list.innerHTML = "";
        const details = Array.isArray(data.details) ? data.details : [];

        details.forEach((line) => {
          const li = document.createElement("li");
          li.textContent = safeText(line, "-");
          list.appendChild(li);
        });
      }

      render(parsePayload());
    </script>
  </body>
</html>
