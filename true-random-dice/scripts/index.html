<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>True Random Dice</title>
  </head>
  <body>
    <script>
      function clampInt(value, fallback, min, max) {
        const n = Number.parseInt(value, 10);
        if (!Number.isFinite(n)) return fallback;
        return Math.min(max, Math.max(min, n));
      }

      function randomUint32() {
        const arr = new Uint32Array(1);
        crypto.getRandomValues(arr);
        return arr[0];
      }

      function randomIntInclusive(maxInclusive) {
        const range = maxInclusive + 1;
        const maxUint32 = 0x100000000; // 2^32
        const threshold = Math.floor(maxUint32 / range) * range;

        while (true) {
          const n = randomUint32();
          if (n < threshold) {
            return n % range;
          }
        }
      }

      function rollDiceLocal(count, sides) {
        const rolls = [];
        for (let i = 0; i < count; i++) {
          rolls.push(randomIntInclusive(sides - 1) + 1);
        }
        const total = rolls.reduce((sum, roll) => sum + roll, 0);
        return {
          count,
          sides,
          rolls,
          total,
        };
      }

      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          const jsonData = JSON.parse(data || "{}");
          const count = clampInt(jsonData.count, 1, 1, 100);
          const sides = clampInt(jsonData.sides, 6, 2, 1000);
          const label = String(jsonData.label || "").trim();

          const result = rollDiceLocal(count, sides);
          if (label) result.label = label;
          return JSON.stringify(result);
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: "Failed to roll true-random dice: " + e.message });
        }
      };
    </script>
  </body>
</html>
