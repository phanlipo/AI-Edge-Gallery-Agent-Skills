<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Search Free</title>
  </head>
  <body>
    <script>
      /**
       * Searches the web for free using DuckDuckGo Instant Answer API.
       * No API key required.
       * @param {string} query - The search query.
       */
      async function searchDuckDuckGo(query) {
        const apiUrl =
          "https://api.duckduckgo.com/?q=" +
          encodeURIComponent(query) +
          "&format=json&no_redirect=1&no_html=1&skip_disambig=1";

        const fallbackURL = "https://duckduckgo.com/?q=" + encodeURIComponent(query);

        const response = await fetch(apiUrl);
        if (!response.ok) {
          throw new Error("DuckDuckGo API returned HTTP " + response.status);
        }

        const data = await response.json();

        const answer = data.Answer || "";
        const abstract = data.Abstract || "";
        const abstractSource = data.AbstractSource || "";
        const abstractURL = data.AbstractURL || "";
        const definition = data.Definition || "";
        const definitionURL = data.DefinitionURL || "";
        const heading = data.Heading || "";

        const relatedTopics = [];
        if (Array.isArray(data.RelatedTopics)) {
          for (const t of data.RelatedTopics) {
            if (relatedTopics.length >= 5) break;
            if (t.Text && t.FirstURL) {
              relatedTopics.push({ title: t.Text, url: t.FirstURL });
            }
          }
        }

        let result = "";
        if (answer) {
          result += `--- ANSWER ---\n${answer}\n\n`;
        }
        if (abstract) {
          result += `--- SUMMARY ---\n`;
          if (heading) result += `${heading}\n`;
          result += `${abstract}\n`;
          if (abstractSource) result += `Source: ${abstractSource} (${abstractURL})\n`;
          result += "\n";
        }
        if (definition) {
          result += `--- DEFINITION ---\n${definition}\n`;
          if (definitionURL) result += `Source: ${definitionURL}\n`;
          result += "\n";
        }
        if (relatedTopics.length > 0) {
          result += `--- RELATED ---\n`;
          for (const t of relatedTopics) {
            result += `• ${t.title}\n  ${t.url}\n`;
          }
          result += "\n";
        }

        if (!result.trim()) {
          return {
            note: "No instant answer found. Search manually: " + fallbackURL,
            searchURL: fallbackURL,
          };
        }

        if (result.length > 5000) {
          result = result.substring(0, 5000) + "\n\n... [TRUNCATED TO SAVE CONTEXT]";
        }

        return { query: query, result: result, searchURL: fallbackURL };
      }

      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          const jsonData = JSON.parse(data);
          if (!jsonData.query) {
            return JSON.stringify({ error: "No query provided." });
          }
          const searchResponse = await searchDuckDuckGo(jsonData.query);
          return JSON.stringify(searchResponse);
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: "Failed to search: " + e.message });
        }
      };
    </script>
  </body>
</html>
